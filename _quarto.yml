project:
  type: book
  output-dir: docs

  # Pre-Render: rendert die RevealJS-Slideshows im slides/-Ordner vor dem
  # eigentlichen Buch-Build. Quarto-Books rendern sonst nur book.chapters.
  pre-render:
    - bash tools/render-slides.sh

  resources:
    - "interactions/**"
    - "images/**"
    - "data/**"
    - "handouts/**"
    - "slides/**"
    - ".nojekyll"

book:
  title: "KI in Tax, Audit & Advisory"
  subtitle: "Workshop-Skript zum 12. und 13.05.2026, TH Köln"
  author: "Prof. Dr. Roman Bartnik"
  date: "2026-05-12"
  date-format: "DD.MM.YYYY"
  search: true
  repo-url: "https://github.com/TH-Koln-Bartnik/workshop-ki-4-taa"
  repo-actions: [edit, issue]
  downloads: [pdf]
  sharing: [linkedin]
  page-navigation: true
  back-to-top-navigation: true
  sidebar:
    style: docked
    background: light
    collapse-level: 2
    logo: images/th-koeln-logo.png
  chapters:
    - index.qmd
    - part: "Teil 1 — Workshop 1 (Di, 12.05.)"
      chapters:
        - parts/01-workshop01.qmd
        - parts/02-uebungen-w1.qmd
#   - part: "Teil 2 — Workshop 2 (Mi, 13.05.)"
#     chapters:
#       - parts/03-workshop02.qmd
#       - parts/04-uebungen-w2.qmd
    - part: "Teil 3 — Hausaufgaben & Wissensbasis"
      chapters:
        - parts/05-hausaufgaben.qmd
        - parts/06-wissensbasis.qmd
    - part: "Anhang"
      chapters:
        - appendix/quickstart.qmd
        - appendix/troubleshooting.qmd
        - appendix/tutor-prompt.qmd
    - references.qmd
  page-footer:
    left: "© 2026 Prof. Dr. Roman Bartnik · TH Köln · CC BY-NC-SA 4.0"
    right: "Erstellt mit [Quarto](https://quarto.org)"

bibliography: references.bib
csl: https://www.zotero.org/styles/apa
citations-hover: true
citation-location: document
link-citations: true

format:
  html:
    theme:
      - cosmo
      - styles.scss
    toc: true
    toc-depth: 3
    toc-title: "Inhalt"
    toc-location: right
    code-copy: true
    code-tools: true
    code-overflow: wrap
    link-external-newwindow: true
    fig-cap-location: bottom
    callout-appearance: simple
    callout-icon: true
    smooth-scroll: true
    anchor-sections: true
    number-sections: false
    df-print: paged
    grid:
      sidebar-width: 300px
  pdf:
    documentclass: scrreprt
    papersize: a4
    geometry: margin=2.5cm
    toc: true
    number-sections: true
    colorlinks: true

lang: de
